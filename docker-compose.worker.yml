# =============================================================================
# JudgeKit Dedicated Judge Worker
#
# Deploy this on dedicated machines to scale judging capacity.
# Each machine runs its own judge worker connecting to the central app server.
#
# Usage:
#   docker compose -f docker-compose.worker.yml up -d
#
# Prerequisites:
#   - Set JUDGE_BASE_URL to the app server's API URL (HTTPS recommended)
#   - Set JUDGE_AUTH_TOKEN to match the app server's judge auth token
#   - Judge language images must be available locally or via registry
#   - /judge-workspaces directory must exist on the host
# =============================================================================

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: judgekit-worker-docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - IMAGES=${WORKER_DOCKER_PROXY_IMAGES:-0}
      # POST / DELETE are REQUIRED for a judge worker because Rust runner
      # calls POST /containers/create and DELETE /containers/{id} to spawn
      # and clean up sandboxes per submission. Hardcoding POST=0 here in
      # an earlier revision was the direct cause of the 14h silent
      # compile_error sweep across the fleet (2026-05-17). The
      # docker-socket-proxy is still locked down compared to bare docker
      # access: container privilege/volume mount controls live in the
      # runner code, not in the socket-proxy ACL.
      #
      # BUILD remains off; image builds on dedicated workers must use a
      # separate overlay (docker-compose.worker-build.override.yml).
      - BUILD=0
      - POST=${WORKER_DOCKER_PROXY_POST:-1}
      - DELETE=${WORKER_DOCKER_PROXY_DELETE:-1}
      - ALLOW_START=${WORKER_DOCKER_PROXY_ALLOW_START:-1}
      - ALLOW_STOP=${WORKER_DOCKER_PROXY_ALLOW_STOP:-1}
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  judge-worker:
    image: judgekit-judge-worker:latest
    container_name: judgekit-judge-worker
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RUNNER_PORT:-3001}:3001"
    volumes:
      - /judge-workspaces:/judge-workspaces
      - judgekit-dead-letter:/app/dead-letter
    environment:
      - JUDGE_BASE_URL=${JUDGE_BASE_URL:?Set JUDGE_BASE_URL to the app server API URL}
      - JUDGE_AUTH_TOKEN=${JUDGE_AUTH_TOKEN:?Set JUDGE_AUTH_TOKEN to match the app server}
      - RUNNER_AUTH_TOKEN=${RUNNER_AUTH_TOKEN:-}
      - JUDGE_CONCURRENCY=${JUDGE_CONCURRENCY:-4}
      - JUDGE_WORKER_HOSTNAME=${JUDGE_WORKER_HOSTNAME:-}
      - JUDGE_SECCOMP_PROFILE=/etc/judge/seccomp-profile.json
      - DEAD_LETTER_DIR=/app/dead-letter
      - TMPDIR=/judge-workspaces
      - RUST_LOG=${RUST_LOG:-info}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - RUNNER_PORT=${RUNNER_PORT:-3001}
      - RUNNER_HOST=0.0.0.0
      - RUNNER_CONCURRENCY=${RUNNER_CONCURRENCY:-4}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      docker-proxy:
        condition: service_started

volumes:
  judgekit-dead-letter:
    driver: local
