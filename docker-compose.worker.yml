# =============================================================================
# JudgeKit Dedicated Judge Worker
#
# Deploy this on dedicated machines to scale judging capacity.
# Each machine runs its own judge worker connecting to the central app server.
#
# Usage:
#   docker compose -f docker-compose.worker.yml up -d
#
# Prerequisites:
#   - Set JUDGE_BASE_URL to the app server's API URL (HTTPS recommended)
#   - Set JUDGE_AUTH_TOKEN to match the app server's judge auth token
#   - Set RUNNER_AUTH_TOKEN to a separate runner/admin endpoint token
#   - Judge language images must be available locally or via registry
#   - /judge-workspaces directory must exist on the host
# =============================================================================

services:
  docker-proxy:
    # Digest-pinned because this service is the only container with direct
    # Docker daemon access. Update intentionally after reviewing upstream.
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: judgekit-worker-docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - IMAGES=${WORKER_DOCKER_PROXY_IMAGES:-0}
      # POST / DELETE are REQUIRED for a judge worker because Rust runner
      # calls POST /containers/create and DELETE /containers/{id} to spawn
      # and clean up sandboxes per submission. Hardcoding POST=0 here in
      # an earlier revision was the direct cause of the 14h silent
      # compile_error sweep across the fleet (2026-05-17). The
      # docker-socket-proxy is still locked down compared to bare docker
      # access: container privilege/volume mount controls live in the
      # runner code, not in the socket-proxy ACL.
      #
      # BUILD remains off; image builds on dedicated workers must use a
      # separate overlay (docker-compose.worker-build.override.yml).
      - BUILD=0
      - POST=${WORKER_DOCKER_PROXY_POST:-1}
      - DELETE=${WORKER_DOCKER_PROXY_DELETE:-1}
      - ALLOW_START=${WORKER_DOCKER_PROXY_ALLOW_START:-1}
      - ALLOW_STOP=${WORKER_DOCKER_PROXY_ALLOW_STOP:-1}
      # EXEC is REQUIRED because the warm container pool runs each test case
      # with `docker exec` inside a pre-started container. With EXEC=0 the
      # proxy denies POST /containers/{id}/exec, every warm attempt fails
      # ("unable to upgrade to tcp, received 403") and silently falls back to a
      # cold run — the pool is then pure overhead. Not env-toggleable, and kept
      # in sync with docker-compose.production.yml.
      # Security: this does not widen the effective attack surface. The proxy
      # already grants CONTAINERS=1 + POST=1 + ALLOW_START=1, and it filters
      # only on path/method — it never inspects the request body — so the
      # worker can already create AND start a `--privileged` container with `/`
      # bind-mounted (empirically confirmed on production). `docker exec` into
      # an existing container is strictly weaker than that.
      - EXEC=1
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  judge-worker:
    image: judgekit-judge-worker:latest
    container_name: judgekit-judge-worker
    # Run as root: the worker chowns each per-run sandbox workspace to uid/gid
    # 65534 before mounting it into the judge container (see runner.rs /
    # executor.rs). That chown needs CAP_CHOWN, which the image's non-root
    # `USER judge` (uid 1000) lacks — without this override the worker fails
    # every run/judge with "Operation not permitted" while the /health check
    # keeps passing, so deploys falsely report WORKER_READY (regression of
    # commit 8129b03f; RPF cycle-1 H2). Keep in sync with
    # docker-compose.production.yml. The spawned judge containers still run
    # `--user 65534` with the full sandbox, so the trust boundary is
    # unchanged; only the worker's own process is root.
    user: "0:0"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RUNNER_PORT:-3001}:3001"
    volumes:
      - /judge-workspaces:/judge-workspaces
      - judgekit-dead-letter:/app/dead-letter
    environment:
      - JUDGE_BASE_URL=${JUDGE_BASE_URL:?Set JUDGE_BASE_URL to the app server API URL}
      - JUDGE_AUTH_TOKEN=${JUDGE_AUTH_TOKEN:?Set JUDGE_AUTH_TOKEN to match the app server}
      - RUNNER_AUTH_TOKEN=${RUNNER_AUTH_TOKEN:?Set RUNNER_AUTH_TOKEN for runner/admin endpoints}
      - JUDGE_CONCURRENCY=${JUDGE_CONCURRENCY:-4}
      - JUDGE_WORKER_HOSTNAME=${JUDGE_WORKER_HOSTNAME:-}
      - JUDGE_SECCOMP_PROFILE=/etc/judge/seccomp-profile.json
      # Optional sandbox resource tuning (worker code defaults shown). Lower on
      # RAM-constrained hosts to bound worst-case memory; raise only if a
      # legitimate problem genuinely needs it. worst-case output RAM ≈
      # JUDGE_MAX_OUTPUT_BYTES × 2 streams × JUDGE_CONCURRENCY.
      # - JUDGE_MAX_OUTPUT_BYTES=134217728   # per-stream stdout/stderr cap (128 MiB)
      # - JUDGE_COMPILE_TIMEOUT_MS=600000    # max compile wall-clock (10 min)
      # - JUDGE_COMPILE_MEMORY_MB=2048       # compile-phase memory ceiling (MB)
      # Stronger OCI runtime for judged containers (defense in depth vs container
      # escape). Requires gVisor installed + registered on the HOST docker daemon
      # (scripts/install-gvisor.sh) AND passing the disposable-worker validation
      # in docs/judge-worker-gvisor.md. Unset = runc (Docker default). Do NOT
      # enable in production before that validation passes.
      # - JUDGE_OCI_RUNTIME=runsc
      - DEAD_LETTER_DIR=/app/dead-letter
      - TMPDIR=/judge-workspaces
      - RUST_LOG=${RUST_LOG:-info}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - RUNNER_PORT=${RUNNER_PORT:-3001}
      - RUNNER_HOST=0.0.0.0
      - RUNNER_CONCURRENCY=${RUNNER_CONCURRENCY:-4}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      docker-proxy:
        condition: service_started

volumes:
  judgekit-dead-letter:
    driver: local
