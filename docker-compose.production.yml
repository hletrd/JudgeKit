# =============================================================================
# JudgeKit Production Deployment
#
# Usage:
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# Prerequisites:
#   - Build images first (or use deploy.sh which handles everything)
#   - Create .env.production from .env.production.example
#   - Judge language images must be available (judge-cpp, judge-python, etc.)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:18-alpine
    container_name: judgekit-db
    restart: unless-stopped
    # Postgres memory tuning is configurable per-target via .env.production.
    # Defaults below suit hosts with 6+ GB RAM. For small instances (e.g.
    # 4GB), set PG_SHARED_BUFFERS=128MB, PG_EFFECTIVE_CACHE_SIZE=512MB,
    # PG_MAINTENANCE_WORK_MEM=64MB in .env.production so the values survive
    # resyncs from deploy-docker.sh.
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-2GB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-128MB}"
      - "-c"
      - "random_page_cost=2"
      - "-c"
      - "effective_io_concurrency=2"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=200"
    volumes:
      - judgekit-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: judgekit
      POSTGRES_USER: judgekit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      # Pin PGDATA so the mounted named volume is the cluster directory
      # regardless of image default. Without this, postgres:18-alpine
      # silently puts data in /var/lib/postgresql/18/docker, which lands
      # inside an anonymous volume when only /var/lib/postgresql/data is
      # mounted. That mismatch caused a data wipe on 2026-04-09.
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judgekit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - db

  # Restricted Docker socket proxy — only the judge worker talks to Docker.
  docker-proxy:
    # Digest-pinned because this service is the only container with direct
    # Docker daemon access. Update intentionally after reviewing upstream.
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: judgekit-docker-proxy
    restart: unless-stopped
    environment:
      # CONTAINERS: required for `docker ps` (orphan sweep), `docker inspect`
      # (exit-code/state recovery), and container metadata reads.
      - CONTAINERS=1
      # POST: required for `docker run` to create submission containers.
      - POST=1
      # DELETE: required for `docker rm` / `docker rm -f` cleanup of finished
      # submission containers. Image deletion is not enabled.
      - DELETE=1
      # ALLOW_START: required because `docker run` creates and starts a
      # container in one operation through the proxy.
      - ALLOW_START=1
      # ALLOW_STOP: required for `docker kill` when a submission times out or
      # for emergency orphan cleanup.
      - ALLOW_STOP=1
      # BUILD/IMAGES stay 0 — image builds must not flow through the worker
      # path, and the worker does not list or pull images.
      - BUILD=0
      - IMAGES=0
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - judge

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: judgekit-app:latest
    container_name: judgekit-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    env_file:
      - .env.production
    volumes:
      - judgekit-app-data:/app/data
    environment:
      - DB_DIALECT=postgresql
      - DATABASE_URL=postgres://judgekit:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/judgekit
      - HOSTNAME=0.0.0.0
      - APP_INSTANCE_COUNT=1
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-false}
      - JUDGE_ALLOW_ANY_JUDGE_IP=${JUDGE_ALLOW_ANY_JUDGE_IP:-0}
      - COMPILER_RUNNER_URL=${COMPILER_RUNNER_URL:-http://judge-worker:3001}
      - CODE_SIMILARITY_URL=${CODE_SIMILARITY_URL:-http://code-similarity:3002}
      - RATE_LIMITER_URL=http://rate-limiter:3001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  judge-worker:
    # No profile gate in the base compose file — integrated targets and
    # manual recovery commands start the worker by default. App-only targets
    # use deploy-docker.sh's generated docker-compose.app-only.yml override
    # to move this service and docker-proxy behind an inactive profile before
    # `up -d` runs.
    build:
      context: .
      dockerfile: Dockerfile.judge-worker
    image: judgekit-judge-worker:latest
    container_name: judgekit-judge-worker
    restart: unless-stopped
    volumes:
      - /judge-workspaces:/judge-workspaces  # Identity-mapped so sibling containers see the same path
      - judgekit-dead-letter:/app/dead-letter
    env_file:
      - .env.production
    environment:
      - JUDGE_BASE_URL=http://app:3000/api/v1
      - JUDGE_SECCOMP_PROFILE=/etc/judge/seccomp-profile.json
      - DEAD_LETTER_DIR=/app/dead-letter
      - TMPDIR=/judge-workspaces
      - DOCKER_HOST=tcp://docker-proxy:2375
      - RUNNER_PORT=3001
      - RUNNER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      docker-proxy:
        condition: service_started
      app:
        condition: service_healthy
    networks:
      - backend
      - judge

  code-similarity:
    build:
      context: .
      dockerfile: Dockerfile.code-similarity
    image: judgekit-code-similarity:latest
    container_name: judgekit-code-similarity
    restart: unless-stopped
    environment:
      RUST_LOG: info
      CODE_SIMILARITY_HOST: 0.0.0.0
      CODE_SIMILARITY_PORT: "3002"
      CODE_SIMILARITY_AUTH_TOKEN: ${CODE_SIMILARITY_AUTH_TOKEN:?CODE_SIMILARITY_AUTH_TOKEN must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - backend

  rate-limiter:
    build:
      context: .
      dockerfile: Dockerfile.rate-limiter-rs
    image: judgekit-rate-limiter:latest
    container_name: judgekit-rate-limiter
    restart: unless-stopped
    environment:
      RUST_LOG: info
      RATE_LIMITER_HOST: 0.0.0.0
      RATE_LIMITER_PORT: "3001"
      RATE_LIMITER_AUTH_TOKEN: ${RATE_LIMITER_AUTH_TOKEN:?RATE_LIMITER_AUTH_TOKEN must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  judge:
    driver: bridge
  db:
    driver: bridge

volumes:
  judgekit-pgdata:
    driver: local
  judgekit-app-data:
    driver: local
  judgekit-dead-letter:
    driver: local
